name: Security Audit
on:
  push:
    branches: [master, main]
    paths: [package.json, package-lock.json]
  pull_request:
    paths: [package.json, package-lock.json]
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9am

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm audit --audit-level=high
